<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Rubik's Tutor Architecture</title>
  <desc id="desc">Architecture diagram for the two-product AI Rubik's Tutor submission on Google Cloud Run.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07162f"/>
      <stop offset="100%" stop-color="#092754"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 52px 'Plus Jakarta Sans', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 22px 'Plus Jakarta Sans', Arial, sans-serif; fill: rgba(255,255,255,0.82); }
      .heading { font: 700 28px 'Plus Jakarta Sans', Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 20px 'Plus Jakarta Sans', Arial, sans-serif; fill: #334155; }
      .label { font: 600 16px 'IBM Plex Mono', monospace; letter-spacing: 0.18em; text-transform: uppercase; fill: #64748b; }
      .chip { font: 600 18px 'Plus Jakarta Sans', Arial, sans-serif; fill: #0f172a; }
      .cloud { font: 700 24px 'Plus Jakarta Sans', Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 18px 'Plus Jakarta Sans', Arial, sans-serif; fill: #475569; }
      .line { stroke: #4f46e5; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .line-soft { stroke: #94a3b8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <rect x="60" y="48" width="1480" height="170" rx="34" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="110" y="120" class="label" fill="#93c5fd">Gemini Live Agent Challenge 2026</text>
  <text x="110" y="182" class="title">AI Rubik's Tutor</text>
  <text x="110" y="215" class="subtitle">Two products in one repo: a Gemini live tutor and a transparent 2x2 core lab, deployed together on Google Cloud Run.</text>

  <rect x="80" y="270" width="430" height="540" rx="30" fill="url(#card)" filter="url(#shadow)"/>
  <text x="120" y="322" class="label">Frontend</text>
  <text x="120" y="366" class="heading">React 19 Product Shell</text>
  <text x="120" y="406" class="body">Routed UI, shared design system, theme sync, and product overview.</text>

  <rect x="120" y="448" width="350" height="120" rx="24" fill="#edf4ff" stroke="#bfdbfe"/>
  <text x="148" y="485" class="label">Part 1</text>
  <text x="148" y="522" class="heading">Gemini Live Tutor</text>
  <text x="148" y="555" class="small">Voice + webcam coaching, session memory, hints, and multiplayer.</text>

  <rect x="120" y="604" width="350" height="140" rx="24" fill="#f3f7ff" stroke="#cbd5e1"/>
  <text x="148" y="641" class="label">Part 2</text>
  <text x="148" y="678" class="heading">Cubey Core 2x2 Lab</text>
  <text x="148" y="711" class="small">Shared 24-sticker cube core with BFS, A*, IDA*, and exact playback.</text>

  <rect x="590" y="270" width="420" height="540" rx="30" fill="url(#card)" filter="url(#shadow)"/>
  <text x="630" y="322" class="label">Backend</text>
  <text x="630" y="366" class="heading">Express 5 + WebSocket Runtime</text>
  <text x="630" y="406" class="body">One backend manages live tutoring, cube logic, runtime metadata, health, and signaling.</text>

  <rect x="630" y="450" width="340" height="92" rx="22" fill="#eefcf5" stroke="#86efac"/>
  <text x="656" y="486" class="chip">Gemini Live transport</text>
  <text x="656" y="516" class="small">`/ws` live tutor session</text>

  <rect x="630" y="564" width="340" height="92" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="656" y="600" class="chip">Runtime + API surface</text>
  <text x="656" y="630" class="small">`/health`, `/api/health`, `/api/runtime`</text>

  <rect x="630" y="678" width="340" height="92" rx="22" fill="#faf5ff" stroke="#d8b4fe"/>
  <text x="656" y="714" class="chip">Multiplayer signaling</text>
  <text x="656" y="744" class="small">`/multiplayer` WebRTC room transport</text>

  <rect x="1090" y="270" width="430" height="540" rx="30" fill="url(#card)" filter="url(#shadow)"/>
  <text x="1130" y="322" class="label">Google Cloud</text>
  <text x="1130" y="366" class="heading">Cloud Run Deployment</text>
  <text x="1130" y="406" class="body">Frontend assets and backend server are bundled into one container image.</text>

  <rect x="1130" y="450" width="350" height="92" rx="22" fill="#eefcf5" stroke="#86efac"/>
  <text x="1156" y="486" class="chip">Cloud Run</text>
  <text x="1156" y="516" class="small">Public app + API host</text>

  <rect x="1130" y="564" width="350" height="92" rx="22" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1156" y="600" class="chip">Cloud Build + Artifact Registry</text>
  <text x="1156" y="630" class="small">Container build and rollout pipeline</text>

  <rect x="1130" y="678" width="350" height="92" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="1156" y="714" class="chip">Secret Manager</text>
  <text x="1156" y="744" class="small">Gemini API key injection for production</text>

  <path class="line" d="M470 508 C530 508, 560 500, 630 496"/>
  <path class="line" d="M470 675 C540 675, 560 705, 630 724"/>
  <path class="line" d="M970 496 C1020 496, 1045 496, 1130 496"/>
  <path class="line" d="M970 610 C1020 610, 1045 610, 1130 610"/>
  <path class="line" d="M970 724 C1020 724, 1045 724, 1130 724"/>

  <rect x="520" y="102" width="210" height="48" rx="24" fill="#ffffff" opacity="0.95"/>
  <text x="555" y="133" class="chip">Voice</text>
  <rect x="750" y="102" width="210" height="48" rx="24" fill="#ffffff" opacity="0.95"/>
  <text x="785" y="133" class="chip">Vision</text>
  <rect x="980" y="102" width="210" height="48" rx="24" fill="#ffffff" opacity="0.95"/>
  <text x="1015" y="133" class="chip">Interactive coaching</text>

  <text x="80" y="860" class="small">Public repo: github.com/mangeshraut712/ai-rubiks-cube</text>
  <text x="945" y="860" class="small">Public Cloud Run: gemini-rubiks-tutor-vnc62azkwq-uc.a.run.app</text>
</svg>
